spring.main.lazy-initialization=true
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/acadlab}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:acadlab}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:acadlab}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Flyway gerenciado manualmente via FlywayConfig para rodar APÓS o Hibernate criar as tabelas
spring.flyway.enabled=false

# Expõe a mensagem da exceção nas respostas de erro para o frontend exibir o motivo
# de uma violação de regra de negócio (sem alterar a lógica de domínio).
spring.web.error.include-message=always
