spring.main.lazy-initialization=true
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/acadlab}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:acadlab}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:acadlab}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
